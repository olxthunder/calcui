<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CalcUI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Design Tokens (from Figma Variables) -->
  <link rel="stylesheet" href="tokens.css">

  <!-- Components -->
  <link rel="stylesheet" href="components/header.css">
  <link rel="stylesheet" href="components/display.css">
  <link rel="stylesheet" href="components/button.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-elevated);
      font-family: 'Inter', sans-serif;
      transition: background 0.2s ease;
    }

    .calc {
      width: 344px;
      background: var(--color-bg-primary);
      border-radius: var(--spacing-5);
      box-shadow: var(--shadow-card);
      padding: var(--spacing-6);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-4);
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(4, 68px);
      grid-template-rows: repeat(5, 68px);
      gap: var(--spacing-2);
    }

    /* btn-zero spans 2 columns */
    #btn-zero {
      grid-column: span 2;
    }
  </style>
</head>
<body>

<div class="calc">

  <!-- Header -->
  <header class="header">
    <div class="header__logo">Calc UI</div>
    <button class="header__theme-btn" aria-label="Toggle theme">
      <span class="header__theme-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M15.5 9.5A6.5 6.5 0 019 16a6.5 6.5 0 010-13 5 5 0 006.5 6.5z" fill="currentColor"/></svg></span>
    </button>
  </header>

  <!-- Display -->
  <div class="display">
    <div class="display__expression">0</div>
    <div class="display__result">0</div>
  </div>

  <!-- Button Grid -->
  <div class="button-grid">

    <!-- Row 1: Utility + Divide -->
    <button id="btn-clear"     class="btn btn--utility" data-action="clear">AC</button>
    <button id="btn-backspace" class="btn btn--utility" data-action="backspace">⌫</button>
    <button id="btn-percent"   class="btn btn--utility" data-action="percent">%</button>
    <button id="btn-divide"    class="btn btn--operator" data-action="operator" data-value="÷" data-op="÷">÷</button>

    <!-- Row 2: 7 8 9 × -->
    <button id="btn-7"         class="btn btn--number" data-action="digit" data-value="7">7</button>
    <button id="btn-8"         class="btn btn--number" data-action="digit" data-value="8">8</button>
    <button id="btn-9"         class="btn btn--number" data-action="digit" data-value="9">9</button>
    <button id="btn-multiply"  class="btn btn--operator" data-action="operator" data-value="×" data-op="×">×</button>

    <!-- Row 3: 4 5 6 - -->
    <button id="btn-4"         class="btn btn--number" data-action="digit" data-value="4">4</button>
    <button id="btn-5"         class="btn btn--number" data-action="digit" data-value="5">5</button>
    <button id="btn-6"         class="btn btn--number" data-action="digit" data-value="6">6</button>
    <button id="btn-subtract"  class="btn btn--operator" data-action="operator" data-value="-" data-op="-">-</button>

    <!-- Row 4: 1 2 3 + -->
    <button id="btn-1"         class="btn btn--number" data-action="digit" data-value="1">1</button>
    <button id="btn-2"         class="btn btn--number" data-action="digit" data-value="2">2</button>
    <button id="btn-3"         class="btn btn--number" data-action="digit" data-value="3">3</button>
    <button id="btn-add"       class="btn btn--operator" data-action="operator" data-value="+" data-op="+">+</button>

    <!-- Row 5: 0 . = -->
    <button id="btn-zero"      class="btn btn--number btn--zero" data-action="digit" data-value="0">0</button>
    <button id="btn-dot"       class="btn btn--number" data-action="dot">.</button>
    <button id="btn-equals"    class="btn btn--equals" data-action="equals">=</button>

  </div>
</div>

<script src="calculator.js"></script>
</body>
</html>
